<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#311042" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#bgGrad)" />
  
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="1.5">
    <circle cx="200" cy="100" r="40" fill="none" />
    <circle cx="1000" cy="300" r="60" fill="none" />
    <line x1="200" y1="100" x2="600" y2="200" />
    <line x1="600" y1="200" x2="1000" y2="300" />
    <line x1="600" y1="200" x2="800" y2="80" />
    <line x1="200" y1="100" x2="400" y2="320" />
  </g>
  
  <circle cx="600" cy="200" r="100" fill="#818cf8" fill-opacity="0.03" filter="url(#glow)" />
  <circle cx="600" cy="200" r="8" fill="#818cf8" />

  <text x="600" y="190" text-anchor="middle" font-family="'Outfit', 'Inter', system-ui, sans-serif" font-size="56" font-weight="900" fill="url(#textGrad)" letter-spacing="2">AWESOME AGENT SCAFFOLDING</text>
  <text x="600" y="240" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="20" font-weight="500" fill="#94a3b8" letter-spacing="1">Evolution, Variants, Components, &amp; Enterprise Applications</text>
</svg>
